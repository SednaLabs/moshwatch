name: ci

on:
  push:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect docs-only pull request
        id: changes
        shell: bash
        run: |
          docs_only=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            docs_only=true
            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              case "$path" in
                *.md|docs/*|LICENSE|NOTICE|LICENSES.md)
                  ;;
                *)
                  docs_only=false
                  break
                  ;;
              esac
            done < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  validate:
    needs: changes
    uses: ./.github/workflows/validate.yml
    with:
      docs_only: ${{ needs.changes.outputs.docs_only == 'true' }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
