name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      docs_only: false

  release:
    needs: validate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Verify signed annotated tag
        shell: bash
        run: |
          set -euo pipefail

          tag_object_type="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.type')"

          if [[ "$tag_object_type" != "tag" ]]; then
            echo "release tag ${RELEASE_TAG} must be an annotated tag" >&2
            exit 1
          fi

          tag_object_sha="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
          tag_verified="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.verification.verified')"
          tag_reason="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.verification.reason')"

          if [[ "$tag_verified" != "true" || "$tag_reason" != "valid" ]]; then
            echo "release tag ${RELEASE_TAG} must be a verified signed tag" >&2
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            g++ \
            libncurses-dev \
            libprotobuf-dev \
            libtool \
            libutempter-dev \
            make \
            pkg-config \
            protobuf-compiler

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$channel" --profile minimal
          rustup override set "$channel"
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1 # v2.8.1

      - name: Package release assets
        run: cargo run --locked -p xtask -- package-release --tag "$RELEASE_TAG"

      - name: Install cargo-cyclonedx
        run: cargo install --locked --version 0.5.9 cargo-cyclonedx

      - name: Generate dependency SBOMs
        shell: bash
        run: |
          set -euo pipefail

          sbom_dir="dist/release"
          mkdir -p "$sbom_dir"

          generate_sbom() {
            local crate_dir="$1"
            local crate_name="$2"
            local sbom_name="$3"

            (
              cd "$crate_dir"
              cargo cyclonedx \
                --format json \
                --spec-version 1.5 \
                --describe binaries \
                --no-build-deps \
                --target x86_64-unknown-linux-gnu
              mv "${crate_name}_bin.cdx.json" "${GITHUB_WORKSPACE}/${sbom_dir}/${sbom_name}"
            )
          }

          generate_sbom crates/moshwatchd moshwatchd "moshwatch-${RELEASE_TAG}-moshwatchd.cdx.json"
          generate_sbom crates/moshwatch-ui moshwatch-ui "moshwatch-${RELEASE_TAG}-moshwatch-ui.cdx.json"

      - name: Download Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: 1.42.3

      - name: Generate packaged mosh-server-real SBOM
        shell: bash
        run: |
          set -euo pipefail

          stage_dir="dist/release/moshwatch-${RELEASE_TAG}-linux-x86_64"

          "${{ steps.syft.outputs.cmd }}" \
            "file:${stage_dir}/bin/mosh-server-real" \
            --source-name mosh-server-real \
            --source-version "$RELEASE_TAG" \
            -o cyclonedx-json=dist/release/moshwatch-${RELEASE_TAG}-mosh-server-real.cdx.json

      - name: Attest packaged mosh-server-real binary
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: dist/release/moshwatch-${{ github.ref_name }}-linux-x86_64/bin/mosh-server-real

      - name: Upload release assets artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ github.ref_name }}
          path: |
            dist/release/moshwatch-${{ github.ref_name }}-linux-x86_64.tar.gz
            dist/release/moshwatch-${{ github.ref_name }}-source.tar.gz
            dist/release/SHA256SUMS
            dist/release/moshwatch-${{ github.ref_name }}-mosh-server-real-build-info.json
            dist/release/moshwatch-${{ github.ref_name }}-moshwatchd.cdx.json
            dist/release/moshwatch-${{ github.ref_name }}-moshwatch-ui.cdx.json
            dist/release/moshwatch-${{ github.ref_name }}-mosh-server-real.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Attest release assets
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            dist/release/moshwatch-${{ github.ref_name }}-linux-x86_64.tar.gz
            dist/release/moshwatch-${{ github.ref_name }}-source.tar.gz

      - name: Publish draft release
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG" \
            "dist/release/moshwatch-${RELEASE_TAG}-linux-x86_64.tar.gz" \
            "dist/release/moshwatch-${RELEASE_TAG}-source.tar.gz" \
            "dist/release/SHA256SUMS" \
            "dist/release/moshwatch-${RELEASE_TAG}-mosh-server-real-build-info.json" \
            "dist/release/moshwatch-${RELEASE_TAG}-moshwatchd.cdx.json" \
            "dist/release/moshwatch-${RELEASE_TAG}-moshwatch-ui.cdx.json" \
            "dist/release/moshwatch-${RELEASE_TAG}-mosh-server-real.cdx.json"
