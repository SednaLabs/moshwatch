name: validate

on:
  workflow_call:
    inputs:
      docs_only:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docs-only:
    if: ${{ inputs.docs_only }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only pull request; skipping heavy validation."

  lint-test:
    if: ${{ !inputs.docs_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            g++ \
            libncurses-dev \
            libprotobuf-dev \
            libtool \
            libutempter-dev \
            make \
            pkg-config \
            protobuf-compiler \
            shellcheck

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$channel" --profile minimal --component clippy --component rustfmt
          rustup override set "$channel"
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1 # v2.8.1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Shell wrapper syntax
        run: bash -n scripts/mosh-server-wrapper.sh

      - name: Shell wrapper lint
        run: shellcheck scripts/mosh-server-wrapper.sh

      - name: Diff check
        run: git diff --check

  observability:
    if: ${{ !inputs.docs_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y prometheus

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$channel" --profile minimal
          rustup override set "$channel"
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1 # v2.8.1

      - name: Check generated observability docs
        run: cargo run --locked -p xtask -- check-observability-docs

      - name: Validate observability assets
        run: cargo run --locked -p xtask -- validate-observability-assets

  build:
    if: ${{ !inputs.docs_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            g++ \
            libncurses-dev \
            libprotobuf-dev \
            libtool \
            libutempter-dev \
            make \
            pkg-config \
            protobuf-compiler

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$channel" --profile minimal
          rustup override set "$channel"
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1 # v2.8.1

      - name: Build instrumented artifacts
        run: cargo run --locked -p xtask -- build

      - name: Derive release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$(python3 -c 'import tomllib; print("v" + tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Create local release tag
        run: git tag -f "${{ steps.release-tag.outputs.tag }}" HEAD

      - name: Package release assets
        run: cargo run --locked -p xtask -- package-release --tag "${{ steps.release-tag.outputs.tag }}"

      - name: Upload dist/bin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-bin-${{ github.sha }}
          path: dist/bin
          if-no-files-found: error
          retention-days: 7
